name: Aggiorna dati Pronto Soccorso Palermo

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui lo scraper
        run: python palermo_ps_scraper.py --json data.json

      - name: Commit e push se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Aggiorna data.json [skip ci]"
          git push
